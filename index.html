<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pastel Calculator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="calculator" aria-label="파스텔 계산기">
        <div class="display" role="region" aria-label="계산기 화면">
          <div class="display__expression" data-expression aria-live="polite"></div>
          <div class="display__value" data-display aria-live="polite">0</div>
        </div>

        <div class="keys" role="group" aria-label="계산기 버튼">
          <button class="key key--op" type="button" data-action="clear" aria-label="전체 지우기">AC</button>
          <button class="key key--op" type="button" data-action="sign" aria-label="부호 변경">±</button>
          <button class="key key--op" type="button" data-action="percent" aria-label="퍼센트">%</button>
          <button class="key key--op" type="button" data-action="operator" data-operator="/" aria-label="나누기">÷</button>

          <button class="key key--num" type="button" data-action="digit" data-digit="7" aria-label="7">7</button>
          <button class="key key--num" type="button" data-action="digit" data-digit="8" aria-label="8">8</button>
          <button class="key key--num" type="button" data-action="digit" data-digit="9" aria-label="9">9</button>
          <button class="key key--op" type="button" data-action="operator" data-operator="*" aria-label="곱하기">×</button>

          <button class="key key--num" type="button" data-action="digit" data-digit="4" aria-label="4">4</button>
          <button class="key key--num" type="button" data-action="digit" data-digit="5" aria-label="5">5</button>
          <button class="key key--num" type="button" data-action="digit" data-digit="6" aria-label="6">6</button>
          <button class="key key--op" type="button" data-action="operator" data-operator="-" aria-label="빼기">−</button>

          <button class="key key--num" type="button" data-action="digit" data-digit="1" aria-label="1">1</button>
          <button class="key key--num" type="button" data-action="digit" data-digit="2" aria-label="2">2</button>
          <button class="key key--num" type="button" data-action="digit" data-digit="3" aria-label="3">3</button>
          <button class="key key--op" type="button" data-action="operator" data-operator="+" aria-label="더하기">+</button>

          <button class="key key--num" type="button" data-action="digit" data-digit="0" aria-label="0">0</button>
          <button class="key key--num" type="button" data-action="decimal" aria-label="소수점">.</button>
          <button class="key key--op" type="button" data-action="backspace" aria-label="한 글자 지우기">⌫</button>
          <button class="key key--equals" type="button" data-action="equals" aria-label="계산 결과">=</button>
        </div>
      </section>
    </main>

    <script src="./script.js" defer></script>
  </body>
</html>
